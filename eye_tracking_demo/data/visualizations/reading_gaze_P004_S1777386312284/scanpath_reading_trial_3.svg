<text x="420.0" y="234.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#1f2933" text-anchor="start">A careful educational system should fail softly. If a model is uncertain, it</text>
<text x="420.0" y="272.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#1f2933" text-anchor="start">should offer optional support rather than make high-stakes decisions. This</text>
<text x="420.0" y="310.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#1f2933" text-anchor="start">principle is especially important when working with students who may have</text>
