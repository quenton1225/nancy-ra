<text x="420.0" y="234.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#1f2933" text-anchor="start">Webcam-based eye tracking estimates where a learner is looking by using a</text>
<text x="420.0" y="272.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#1f2933" text-anchor="start">standard camera. The signal is noisier than a research-grade eye tracker, but</text>
<text x="420.0" y="310.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#1f2933" text-anchor="start">it can be useful for low-risk measures such as reading time, off-screen gaze,</text>
<text x="420.0" y="348.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#1f2933" text-anchor="start">and attention shifts.</text>
